# Profile "docker": usado quando a aplicacao roda via docker compose.
# Sobrescreve o datasource H2 (do application.properties) por PostgreSQL.
# O host "postgres" e' o nome do servico no docker-compose.yml.

spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:prazos}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:prazos}
spring.datasource.password=${POSTGRES_PASSWORD:prazos}

# Console do H2 nao se aplica ao Postgres.
spring.h2.console.enabled=false
