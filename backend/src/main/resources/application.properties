spring.application.name=prazos

spring.datasource.url=jdbc:h2:mem:prazosdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.structured.format.file=ecs
logging.file.name=logs/prazos.json

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Autenticacao JWT. O segredo precisa ter no minimo 32 bytes (HS256).
# Em producao, sobrescreva por variavel de ambiente JWT_SECRET.
app.jwt.secret=${JWT_SECRET:troque-este-segredo-de-desenvolvimento-com-32+caracteres}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
