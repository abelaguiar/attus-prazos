services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prazos}
      POSTGRES_USER: ${POSTGRES_USER:-prazos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prazos}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prazos} -d ${POSTGRES_DB:-prazos}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB:-prazos}
      POSTGRES_USER: ${POSTGRES_USER:-prazos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prazos}
      # Segredo do JWT (HS256, minimo 32 bytes). Defina JWT_SECRET no ambiente em producao.
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-de-desenvolvimento-com-32+caracteres}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
